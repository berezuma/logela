<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manex-en Logela - Ikuspegi Isometrikoa</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #1a1a2e; 
    overflow: hidden; 
    font-family: 'Segoe UI', sans-serif;
  }
  canvas { display: block; }
  #info {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 16px 24px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    font-size: 14px;
    line-height: 1.6;
    max-width: 280px;
  }
  #info h2 { font-size: 18px; margin-bottom: 8px; color: #7ec8e3; }
  #info p { color: #ccc; font-size: 12px; }
  #controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
  }
  .btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.3s;
  }
  .btn:hover { background: rgba(255,255,255,0.2); }
  .btn.active { background: rgba(126,200,227,0.3); border-color: #7ec8e3; }
  #legend {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 16px 20px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    font-size: 12px;
  }
  #legend h3 { font-size: 14px; margin-bottom: 8px; color: #7ec8e3; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .legend-color { width: 14px; height: 14px; border-radius: 3px; }
</style>
</head>
<body>
<div id="info">
  <h2>Manex-en Logela</h2>
  <p>Ohea: 1,35 \u00d7 1,90 m (hormetara itsatsita)<br>
  Gela: \u22483,81 \u00d7 2,66 m<br>
  Arratonatu ikuspegi aldatzeko</p>
</div>
<div id="legend">
  <h3>Altzariak</h3>
  <div class="legend-item"><div class="legend-color" style="background:#e8dcc8"></div> Ohea (1,35\u00d71,90m)</div>
  <div class="legend-item"><div class="legend-color" style="background:#d4c5a9"></div> Armairu (3 ate)</div>
  <div class="legend-item"><div class="legend-color" style="background:#f0ebe3"></div> Idazmahai + kajoiak</div>
  <div class="legend-item"><div class="legend-color" style="background:#2c3e50"></div> Bulegoko aulkia</div>
  <div class="legend-item"><div class="legend-color" style="background:#2c5aa0"></div> Puf urdina</div>
  <div class="legend-item"><div class="legend-color" style="background:#d4a06a"></div> Mahai txikia</div>
  <div class="legend-item"><div class="legend-color" style="background:#f5f0e8"></div> Apalategia</div>
</div>
<div id="controls">
  <button class="btn active" onclick="setView('iso1')">Aurretik</button>
  <button class="btn" onclick="setView('iso2')">Atzetik</button>
  <button class="btn" onclick="setView('top')">Goitik</button>
  <button class="btn" onclick="setView('close')">Hurbilago</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.OrthographicCamera(-4, 4, 3, -3, 0.1, 100);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xfff5e6, 0.8);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xb0c4de, 0.3);
fillLight.position.set(-3, 4, -2);
scene.add(fillLight);

// Window light (warm yellowish from outside)
const windowLight = new THREE.PointLight(0xffeaa7, 0.6, 5);
windowLight.position.set(0.5, 1.5, -1.2);
scene.add(windowLight);

// Materials
const wallMat = new THREE.MeshStandardMaterial({ color: 0xf5f0eb, roughness: 0.9 });
const wallGrayMat = new THREE.MeshStandardMaterial({ color: 0x8a9bae, roughness: 0.85 });
const floorMat = new THREE.MeshStandardMaterial({ color: 0xc4a882, roughness: 0.7 });
const bedFrameMat = new THREE.MeshStandardMaterial({ color: 0xf5f0e8, roughness: 0.5 });
const bedSheetMat = new THREE.MeshStandardMaterial({ color: 0xd6e6f0, roughness: 0.8 });
const pillowMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
const pillowBlueMat = new THREE.MeshStandardMaterial({ color: 0x2c5aa0, roughness: 0.85 });
const wardrobeMat = new THREE.MeshStandardMaterial({ color: 0xd4c5a9, roughness: 0.6 });
const deskMat = new THREE.MeshStandardMaterial({ color: 0xf0ebe3, roughness: 0.4 });
const chairMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.7 });
const chairMetalMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6, roughness: 0.3 });
const windowFrameMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
const glassMat = new THREE.MeshStandardMaterial({ color: 0xa8d8ea, transparent: true, opacity: 0.3, roughness: 0.1 });
const doorMat = new THREE.MeshStandardMaterial({ color: 0xf0ebe3, roughness: 0.5 });
const beanBagMat = new THREE.MeshStandardMaterial({ color: 0x1a3a6a, roughness: 0.9 });
const shelfMat = new THREE.MeshStandardMaterial({ color: 0xf5f0e8, roughness: 0.5 });
const tableMat = new THREE.MeshStandardMaterial({ color: 0xd4a06a, roughness: 0.6 });
const rugMat = new THREE.MeshStandardMaterial({ color: 0xd5cfc5, roughness: 1.0 });
const lampMat = new THREE.MeshStandardMaterial({ color: 0xfff5e0, roughness: 0.8, emissive: 0xfff5e0, emissiveIntensity: 0.15 });
const posterMat = new THREE.MeshStandardMaterial({ color: 0xe84040, roughness: 0.7 });
const greenMat = new THREE.MeshStandardMaterial({ color: 0x66bb6a, roughness: 0.8 });
const drawerMat = new THREE.MeshStandardMaterial({ color: 0xe8e3db, roughness: 0.4 });

// Room dimensions (in meters, scaled 1:1)
const RW = 3.81; // room width (X)
const RD = 2.91; // room depth (Z) - 1.89 + 1.02
const RH = 2.50; // room height (Y)

// Center offset
const ox = -RW/2;
const oz = -RD/2;

// Floor
const floor = new THREE.Mesh(
  new THREE.BoxGeometry(RW, 0.05, RD),
  floorMat
);
floor.position.set(ox + RW/2, -0.025, oz + RD/2);
floor.receiveShadow = true;
scene.add(floor);

// Rug (under desk area)
const rug = new THREE.Mesh(
  new THREE.BoxGeometry(1.4, 0.02, 1.2),
  rugMat
);
rug.position.set(ox + 2.5, 0.01, oz + 2.0);
rug.receiveShadow = true;
scene.add(rug);

// Walls
function createWall(w, h, d, x, y, z, mat) {
  const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  wall.position.set(x, y, z);
  wall.receiveShadow = true;
  wall.castShadow = true;
  scene.add(wall);
  return wall;
}

// Back wall (with window) - Z=0
createWall(RW, RH, 0.12, ox+RW/2, RH/2, oz-0.06, wallMat);

// Left wall - X=0
createWall(0.12, RH, RD, ox-0.06, RH/2, oz+RD/2, wallMat);

// Right wall - X=RW (partial, upper portion with gray accent)
createWall(0.12, RH, RD, ox+RW+0.06, RH/2, oz+RD/2, wallMat);

// Ceiling (gray accent like in photos)
const ceiling = new THREE.Mesh(
  new THREE.BoxGeometry(RW, 0.08, RD),
  wallGrayMat
);
ceiling.position.set(ox+RW/2, RH+0.04, oz+RD/2);
scene.add(ceiling);

// === WINDOW (back wall, right side) ===
// Window opening - cut by placing white frame
const winW = 1.0, winH = 1.1;
const winX = ox + 2.5, winY = 1.3;

// Window frame
function createWindowFrame() {
  const group = new THREE.Group();
  const frameT = 0.06;
  // Outer frame
  const top = new THREE.Mesh(new THREE.BoxGeometry(winW+0.1, frameT, 0.15), windowFrameMat);
  top.position.set(0, winH/2, 0);
  group.add(top);
  const bot = new THREE.Mesh(new THREE.BoxGeometry(winW+0.1, frameT, 0.15), windowFrameMat);
  bot.position.set(0, -winH/2, 0);
  group.add(bot);
  const left = new THREE.Mesh(new THREE.BoxGeometry(frameT, winH, 0.15), windowFrameMat);
  left.position.set(-winW/2, 0, 0);
  group.add(left);
  const right = new THREE.Mesh(new THREE.BoxGeometry(frameT, winH, 0.15), windowFrameMat);
  right.position.set(winW/2, 0, 0);
  group.add(right);
  // Center divider
  const mid = new THREE.Mesh(new THREE.BoxGeometry(frameT*0.7, winH, 0.12), windowFrameMat);
  mid.position.set(0, 0, 0);
  group.add(mid);
  // Glass panes
  const glass1 = new THREE.Mesh(new THREE.BoxGeometry(winW/2-0.05, winH-0.1, 0.02), glassMat);
  glass1.position.set(-winW/4, 0, 0);
  group.add(glass1);
  const glass2 = new THREE.Mesh(new THREE.BoxGeometry(winW/2-0.05, winH-0.1, 0.02), glassMat);
  glass2.position.set(winW/4, 0, 0);
  group.add(glass2);
  // Shutter (partially open)
  const shutter = new THREE.Mesh(new THREE.BoxGeometry(winW+0.1, 0.3, 0.08), new THREE.MeshStandardMaterial({color: 0xcccccc, roughness: 0.4}));
  shutter.position.set(0, winH/2+0.2, -0.05);
  group.add(shutter);
  
  return group;
}
const window1 = createWindowFrame();
window1.position.set(winX, winY, oz);
scene.add(window1);

// === DOOR (left wall, back portion) ===
const doorGroup = new THREE.Group();
const doorW = 0.80, doorH = 2.05;
// Door panel
const doorPanel = new THREE.Mesh(new THREE.BoxGeometry(0.06, doorH, doorW), doorMat);
doorPanel.castShadow = true;
doorGroup.add(doorPanel);
// Door frame
const doorFrameTop = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.06, doorW+0.1), windowFrameMat);
doorFrameTop.position.set(0, doorH/2+0.03, 0);
doorGroup.add(doorFrameTop);
// Door handle
const handle = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.03, 0.12), chairMetalMat);
handle.position.set(0.04, 0, doorW/2-0.15);
doorGroup.add(handle);
// "MANEX" letters on door (small colored rectangles)
for(let i=0; i<5; i++) {
  const letter = new THREE.Mesh(
    new THREE.BoxGeometry(0.04, 0.07, 0.07),
    new THREE.MeshStandardMaterial({color: [0xc0392b, 0x27ae60, 0x2980b9, 0xf39c12, 0x8e44ad][i]})
  );
  letter.position.set(0.04, doorH/2-0.15, -doorW/2+0.15+i*0.1);
  doorGroup.add(letter);
}

doorGroup.position.set(ox, doorH/2, oz+0.5);
scene.add(doorGroup);

// === BED (1.35 x 1.90m, against back-left corner walls) ===
const bedW = 1.35, bedL = 1.90, bedH = 0.45;
const bedGroup = new THREE.Group();

// Bed frame base
const bedBase = new THREE.Mesh(new THREE.BoxGeometry(bedW, bedH*0.7, bedL), bedFrameMat);
bedBase.position.set(0, bedH*0.35, 0);
bedBase.castShadow = true;
bedGroup.add(bedBase);

// Drawers under bed (2 drawers visible)
for(let i=0; i<2; i++) {
  const drawer = new THREE.Mesh(new THREE.BoxGeometry(bedW-0.05, 0.18, bedL/2-0.08), drawerMat);
  drawer.position.set(0.01, 0.12, -bedL/4+0.02 + i*(bedL/2));
  bedGroup.add(drawer);
  // Drawer handle
  const dh = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.02, 0.02), chairMetalMat);
  dh.position.set(bedW/2+0.005, 0.12, -bedL/4+0.02 + i*(bedL/2));
  bedGroup.add(dh);
}

// Headboard (against back wall)
const headboard = new THREE.Mesh(new THREE.BoxGeometry(bedW, 0.4, 0.06), bedFrameMat);
headboard.position.set(0, bedH+0.2, -bedL/2+0.03);
bedGroup.add(headboard);

// Mattress
const mattress = new THREE.Mesh(new THREE.BoxGeometry(bedW-0.06, 0.15, bedL-0.06), new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.9}));
mattress.position.set(0, bedH+0.075, 0);
bedGroup.add(mattress);

// Bedding (blue and white stripes effect)
const bedding = new THREE.Mesh(new THREE.BoxGeometry(bedW-0.08, 0.06, bedL*0.65), bedSheetMat);
bedding.position.set(0, bedH+0.18, bedL*0.12);
bedGroup.add(bedding);

// Pillows (white + blue)
const pillow1 = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.12, 0.35), pillowMat);
pillow1.position.set(-0.25, bedH+0.21, -bedL/2+0.3);
pillow1.rotation.x = -0.1;
bedGroup.add(pillow1);

const pillow2 = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.12, 0.35), pillowBlueMat);
pillow2.position.set(0.25, bedH+0.21, -bedL/2+0.3);
pillow2.rotation.x = -0.1;
bedGroup.add(pillow2);

// Stitch plush (simplified blue sphere on bed)
const stitch = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), new THREE.MeshStandardMaterial({color: 0x40b0d0, roughness: 0.9}));
stitch.position.set(0.15, bedH+0.3, -bedL/4);
bedGroup.add(stitch);
const stitchHead = new THREE.Mesh(new THREE.SphereGeometry(0.08, 10, 10), new THREE.MeshStandardMaterial({color: 0x40b0d0, roughness: 0.9}));
stitchHead.position.set(0.15, bedH+0.42, -bedL/4);
bedGroup.add(stitchHead);

// Position bed against back-left walls
bedGroup.position.set(ox + bedW/2 + 0.1, 0, oz + bedL/2 + 0.1);
scene.add(bedGroup);

// === SMALL SIDE TABLE (next to bed) ===
const sideTable = new THREE.Group();
const stTop = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.03, 0.35), tableMat);
stTop.position.set(0, 0.45, 0);
sideTable.add(stTop);
// Legs (X shape simplified as 2 flat pieces)
const stLeg1 = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.44, 0.03), tableMat);
stLeg1.position.set(0, 0.22, -0.1);
sideTable.add(stLeg1);
const stLeg2 = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.44, 0.03), tableMat);
stLeg2.position.set(0, 0.22, 0.1);
sideTable.add(stLeg2);
// Soccer ball
const ball = new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 12), new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.6}));
ball.position.set(0, 0.56, 0);
sideTable.add(ball);
sideTable.position.set(ox + bedW + 0.4, 0, oz + 0.3);
scene.add(sideTable);

// === BEAN BAG (blue, in front of bed) ===
const beanBag = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 12), beanBagMat);
beanBag.scale.set(1, 0.7, 1);
beanBag.position.set(ox + 0.5, 0.2, oz + bedL + 0.5);
beanBag.castShadow = true;
scene.add(beanBag);

// === WARDROBE (3 doors + bookshelf, along left wall) ===
const wardrobeGroup = new THREE.Group();
const wW = 0.58, wH = 2.0, wD = 1.80; // depth along Z wall

// Main body
const wBody = new THREE.Mesh(new THREE.BoxGeometry(wW, wH, wD), wardrobeMat);
wBody.position.set(0, wH/2, 0);
wBody.castShadow = true;
wardrobeGroup.add(wBody);

// Door lines (3 doors)
for(let i=0; i<2; i++) {
  const line = new THREE.Mesh(
    new THREE.BoxGeometry(wW+0.01, wH-0.1, 0.01),
    new THREE.MeshStandardMaterial({color: 0xbeb49c})
  );
  line.position.set(0, wH/2, -wD/2+wD/3*(i+1));
  wardrobeGroup.add(line);
}

// Door handles (3)
for(let i=0; i<3; i++) {
  const wHandle = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), new THREE.MeshStandardMaterial({color: 0x7890a0, metalness: 0.3}));
  wHandle.position.set(wW/2+0.02, wH*0.55, -wD/2+wD/6+i*wD/3);
  wardrobeGroup.add(wHandle);
}

// Bookshelf (attached to wardrobe, open shelves)
const bsW = 0.35, bsH = 2.0, bsD = wW;
const bsGroup = new THREE.Group();
// Sides
const bsSide1 = new THREE.Mesh(new THREE.BoxGeometry(bsW, bsH, 0.02), shelfMat);
bsSide1.position.set(0, bsH/2, -bsD/2);
bsGroup.add(bsSide1);
const bsSide2 = new THREE.Mesh(new THREE.BoxGeometry(bsW, bsH, 0.02), shelfMat);
bsSide2.position.set(0, bsH/2, bsD/2);
bsGroup.add(bsSide2);
const bsBack = new THREE.Mesh(new THREE.BoxGeometry(0.02, bsH, bsD), shelfMat);
bsBack.position.set(-bsW/2, bsH/2, 0);
bsGroup.add(bsBack);
// Shelves (4)
for(let i=0; i<5; i++) {
  const shelf = new THREE.Mesh(new THREE.BoxGeometry(bsW, 0.02, bsD), shelfMat);
  shelf.position.set(0, i*bsH/4, 0);
  bsGroup.add(shelf);
}
// Books on shelves (colored blocks)
const bookColors = [0xc0392b, 0x2980b9, 0xf39c12, 0x27ae60, 0x8e44ad, 0xe67e22];
for(let s=1; s<4; s++) {
  for(let b=0; b<3; b++) {
    const book = new THREE.Mesh(
      new THREE.BoxGeometry(0.12+Math.random()*0.08, bsH/4-0.08, 0.04+Math.random()*0.03),
      new THREE.MeshStandardMaterial({color: bookColors[(s*3+b)%bookColors.length], roughness: 0.7})
    );
    book.position.set(0.02, s*bsH/4+bsH/8, -bsD/4+b*bsD/4);
    bsGroup.add(book);
  }
}

bsGroup.position.set(wW/2+bsW/2, 0, wD/2+0.05);
wardrobeGroup.add(bsGroup);

wardrobeGroup.position.set(ox+wW/2+0.1, 0, oz+RD/2+0.2);
scene.add(wardrobeGroup);

// === HEIGHT CHART (on wall near window) ===
const heightChart = new THREE.Mesh(
  new THREE.BoxGeometry(0.08, 1.0, 0.02),
  new THREE.MeshStandardMaterial({color: 0xf0f0f0, roughness: 0.7})
);
// Colored dots on height chart
heightChart.position.set(ox+bedW+1.0, 1.2, oz+0.02);
scene.add(heightChart);

// === DESK with ALEX drawers (right side of room) ===
const deskGroup = new THREE.Group();
const dkW = 1.60, dkH = 0.75, dkD = 0.60;

// Desktop surface
const desktop = new THREE.Mesh(new THREE.BoxGeometry(dkW, 0.04, dkD), deskMat);
desktop.position.set(0, dkH, 0);
desktop.castShadow = true;
deskGroup.add(desktop);

// Drawer unit (right side, ALEX-style)
const drawerUnit = new THREE.Mesh(new THREE.BoxGeometry(0.40, dkH-0.02, dkD-0.02), deskMat);
drawerUnit.position.set(dkW/2-0.22, dkH/2-0.01, 0);
drawerUnit.castShadow = true;
deskGroup.add(drawerUnit);

// Drawer lines
for(let i=0; i<4; i++) {
  const dl = new THREE.Mesh(
    new THREE.BoxGeometry(0.39, 0.01, dkD-0.04),
    new THREE.MeshStandardMaterial({color: 0xccc5bb})
  );
  dl.position.set(dkW/2-0.22, 0.12+i*0.17, 0);
  deskGroup.add(dl);
}

// Left leg (simple, since no drawers on that side)
const deskLeg = new THREE.Mesh(new THREE.BoxGeometry(0.04, dkH-0.04, dkD-0.1), deskMat);
deskLeg.position.set(-dkW/2+0.1, dkH/2-0.02, 0);
deskGroup.add(deskLeg);

// Items on desk
// Laptop
const laptop = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.015, 0.22), new THREE.MeshStandardMaterial({color: 0x1a1a1a, roughness: 0.3}));
laptop.position.set(-0.2, dkH+0.02, -0.05);
deskGroup.add(laptop);
// Lamp
const lampBase = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.02, 0.08), new THREE.MeshStandardMaterial({color: 0x222222}));
lampBase.position.set(0.15, dkH+0.03, -0.2);
deskGroup.add(lampBase);
const lampArm = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.35, 0.02), new THREE.MeshStandardMaterial({color: 0x222222}));
lampArm.position.set(0.15, dkH+0.2, -0.2);
deskGroup.add(lampArm);
const lampShade = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.03, 0.08, 12), new THREE.MeshStandardMaterial({color: 0x222222}));
lampShade.position.set(0.15, dkH+0.4, -0.2);
deskGroup.add(lampShade);

// Globe
const globe = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), new THREE.MeshStandardMaterial({color: 0x4a90d9, roughness: 0.6}));
globe.position.set(dkW/2-0.1, dkH+0.15, 0.05);
deskGroup.add(globe);
const globeBase = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.06, 12), tableMat);
globeBase.position.set(dkW/2-0.1, dkH+0.05, 0.05);
deskGroup.add(globeBase);

// Position desk against right wall
deskGroup.position.set(ox+RW-dkW/2-0.05, 0, oz+RD-dkD/2-0.15);
scene.add(deskGroup);

// === OFFICE CHAIR ===
const chairGroup = new THREE.Group();
// Seat
const seat = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.08, 0.42), chairMat);
seat.position.set(0, 0.48, 0);
chairGroup.add(seat);
// Back
const back = new THREE.Mesh(new THREE.BoxGeometry(0.43, 0.55, 0.06), chairMat);
back.position.set(0, 0.8, -0.2);
back.rotation.x = 0.1;
chairGroup.add(back);
// Pedestal
const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.35, 8), chairMetalMat);
pedestal.position.set(0, 0.25, 0);
chairGroup.add(pedestal);
