<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manex-en Logela 3D</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#2c3e50;font-family:'Nunito',sans-serif}
canvas{display:block}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#title-bar{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:rgba(20,20,30,0.82);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:8px 24px;display:flex;align-items:center;gap:14px;pointer-events:auto}
#title-bar h1{font-size:1rem;font-weight:800;color:#e2e8f0;letter-spacing:1.5px}
#title-bar span{font-size:0.75rem;color:#64748b}
#controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:auto;flex-wrap:wrap;justify-content:center}
.btn{padding:8px 16px;background:rgba(20,20,30,0.82);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#94a3b8;font-family:'Nunito',sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;transition:all 0.2s;user-select:none}
.btn:hover{background:rgba(40,50,70,0.9);color:#e2e8f0;border-color:rgba(100,170,255,0.4)}
.btn.active{background:rgba(59,130,246,0.3);border-color:#3b82f6;color:#93c5fd}
.btn.special{border-color:rgba(250,200,50,0.4);color:#fcd34d}
.btn.special:hover{border-color:#fbbf24;color:#fef3c7;background:rgba(250,200,50,0.15)}
.btn.special.active{background:rgba(250,200,50,0.25);border-color:#fbbf24;color:#fde68a}
#help{position:fixed;bottom:16px;right:16px;background:rgba(20,20,30,0.82);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px 14px;color:#64748b;font-size:0.7rem;line-height:1.7;pointer-events:auto}
#help b{color:#94a3b8}
#label{position:fixed;top:65px;left:50%;transform:translateX(-50%);background:rgba(20,20,30,0.88);backdrop-filter:blur(12px);border:1px solid rgba(100,170,255,0.25);border-radius:12px;padding:10px 22px;color:#93c5fd;font-size:0.9rem;font-weight:700;pointer-events:none;opacity:0;transition:opacity 0.35s}
#label.show{opacity:1}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 0.5s}
#loading.hide{opacity:0;pointer-events:none}
#loading h1{font-size:2rem;font-weight:800;color:#e2e8f0;margin-bottom:4px}
#loading p{color:#64748b;font-size:0.9rem;margin-bottom:24px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.06);border-top-color:#3b82f6;border-radius:50%;animation:sp 0.7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading"><h1>Manex-en Logela</h1><p>3D eredua kargatzen — plano errealarekin</p><div class="spinner"></div></div>
<div id="ui">
  <div id="title-bar"><h1>MANEX-EN LOGELA</h1><span>3.81m × 3.35m — Plano erreala</span></div>
  <div id="controls">
    <button class="btn" onclick="flyTo('overview')">Orokorra</button>
    <button class="btn" onclick="flyTo('bed')">Ohea</button>
    <button class="btn" onclick="flyTo('desk')">Mahaia</button>
    <button class="btn" onclick="flyTo('wardrobe')">Armairua</button>
    <button class="btn" onclick="flyTo('top')">Goitik</button>
    <button class="btn special active" id="wallBtn" onclick="toggleWalls()">Hormak: Gardenak</button>
    <button class="btn special active" id="roofBtn" onclick="toggleRoof()">Sabaia: Kenduta</button>
  </div>
  <div id="help"><b>Ezker:</b> biratu · <b>Eskuin:</b> mugitu · <b>Gurpila:</b> zoom</div>
  <div id="label"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/*
  PLANOA (goitik ikusita):
  
  Ipar horma (Z-) 3.81m: ARMAIRUA (2.39m) + LIBURUTEGIA
  ┌──────────────────────────────────┐
  │  ARMAIRUA 3ate+shelf    │        │
  │                         │        │
  Mendeb.                    Ekialde
  (X-)  LEIHOA              (X+) ATEA
  3.35m  +                   3.35m
  │  OHEA 1.35x1.90   MAHAIA+LEIHOAK│
  │  (burua X-)        │  (2 leiho) │
  │  beanbag            │   poster   │
  └──────────────────────────────────┘
  Hego horma (Z+) 3.81m: hegazkin pegatinoak
  
  Atea: Ekialde horma, ipar aldean
  Mahaia: Ekialde horma, atearen hegoaldean  
  2 Leiho: Ekialde horma, erdialdean
  Armairua: Ipar horma osoan
  1 Leiho: Mendebalde horma, erdialdean
  Ohea: Mendebalde horma, hego aldean (burua X-)
*/

// Real dimensions from the plan
const RW=3.81, RD=3.35, RH=2.80;
const HW=RW/2, HD=RD/2;
const WT=0.15; // wall thickness

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x5a8050);

const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.05,80);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.15;
document.body.appendChild(renderer.domElement);

// ─── OUTDOOR ───
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(50,50),new THREE.MeshStandardMaterial({color:0x5a8f4a,roughness:0.95}));
gnd.rotation.x=-Math.PI/2;gnd.position.y=-0.02;gnd.receiveShadow=true;scene.add(gnd);
// Path
const patio=new THREE.Mesh(new THREE.PlaneGeometry(2.5,1.5),new THREE.MeshStandardMaterial({color:0xa0937a,roughness:0.85}));
patio.rotation.x=-Math.PI/2;patio.position.set(HW+1.5,0.005,0);scene.add(patio);
function addTree(x,z,h){
  const tk=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.1,h*0.4,8),new THREE.MeshStandardMaterial({color:0x6b4226,roughness:0.9}));
  tk.position.set(x,h*0.2,z);tk.castShadow=true;scene.add(tk);
  const cr=new THREE.Mesh(new THREE.SphereGeometry(h*0.3,8,8),new THREE.MeshStandardMaterial({color:0x3d7a2a+Math.floor(Math.random()*0x150000),roughness:0.85}));
  cr.position.set(x,h*0.5,z);cr.castShadow=true;scene.add(cr);
}
addTree(-4,1,3.2);addTree(-4.2,-1.5,2.8);addTree(4.5,2.5,3);addTree(5,-2,2.5);addTree(-5,-2.5,3.5);addTree(4,-3.5,2);
function addBush(x,z,s){
  const b=new THREE.Mesh(new THREE.SphereGeometry(s,8,6),new THREE.MeshStandardMaterial({color:0x4a7a3a,roughness:0.9}));
  b.position.set(x,s*0.4,z);b.scale.y=0.55;b.castShadow=true;scene.add(b);
}
for(let i=0;i<6;i++)addBush(-HW-0.7,-HD+i*0.6+0.3,0.3+Math.random()*0.15);
addBush(HW+0.8,1,0.4);addBush(HW+0.9,-0.5,0.35);

// ─── LIGHTS ───
scene.add(new THREE.HemisphereLight(0x87ceeb,0x4a7a3a,0.5));
const sun=new THREE.DirectionalLight(0xfff5e0,0.95);
sun.position.set(-5,10,4);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.near=0.5;sun.shadow.camera.far=30;
sun.shadow.camera.left=-8;sun.shadow.camera.right=8;sun.shadow.camera.top=8;sun.shadow.camera.bottom=-8;sun.shadow.bias=-0.001;
scene.add(sun);
const roomL=new THREE.PointLight(0xfff8e7,0.45,8);roomL.position.set(0,2.4,0);roomL.castShadow=true;scene.add(roomL);
// Window light from east
const wle=new THREE.SpotLight(0xfff8e7,0.3,6,Math.PI/5);wle.position.set(HW+1,2,0.3);wle.target.position.set(0,0.5,0.3);scene.add(wle);scene.add(wle.target);
// Window light from west
const wlw=new THREE.SpotLight(0xfff8e7,0.25,6,Math.PI/5);wlw.position.set(-HW-1,2,-0.2);wlw.target.position.set(0,0.5,-0.2);scene.add(wlw);scene.add(wlw.target);

// ─── MATERIALS ───
function M(c,r=0.7,o={}){return new THREE.MeshStandardMaterial({color:c,roughness:r,...o})}
const m={
  wI:M(0xf0ede8,0.92),wE:M(0xe8e0d4,0.8),wG:M(0x8a929e,0.85),
  fl:M(0xc4a882,0.65),flP:M(0xb89b72,0.7),
  ceil:M(0xf5f0eb,0.95),bb:M(0xe8e0d4,0.7),
  wh:M(0xf5f3ef,0.55),cr:M(0xfaf6f0,0.6),ww:M(0xfaf8f5,0.5),
  wd:M(0xc9a06c,0.6),wdL:M(0xd4b48a,0.55),wdD:M(0x7a5c3a,0.55),
  bDk:M(0x1e3a5f,0.75),bMd:M(0x4a7ab5,0.65),
  bLt:M(0x93c5fd,0.6),bPl:M(0xc5ddf5,0.7),bBb:M(0xdbeafe,0.65),sW:M(0xf8f9fa,0.6),
  bk:M(0x1a1a24,0.5),cD:M(0x2a2a35,0.45),cM:M(0x4a4a55,0.3),
  bn:M(0x1a3a8a,0.82),
  st:M(0x38bdf8,0.65),stD:M(0x2096c9,0.6),
  rd:M(0xd63031,0.6),gn:M(0x27ae60,0.65),yw:M(0xf1c40f,0.55),or:M(0xe67e22,0.6),
  gl:M(0xd0e8f5,0.05,{transparent:true,opacity:0.22}),
  gF:M(0xf0f0f0,0.4),sh:M(0xbac4cf,0.55),sS:M(0xa8b4c0,0.5),
  lS:M(0xfef3c7,0.35,{transparent:true,opacity:0.82,emissive:0xfef3c7,emissiveIntensity:0.25}),
  pA:M(0xe8d060,0.5),
  gC:M(0xfefcf5,0.75),cp:M(0xcdd1d6,0.88),cpD:M(0xa5adb5,0.85),
  dW:M(0xf0ece6,0.6),sc:M(0xfafafa,0.45),
  gb:M(0x5b9bd5,0.4),gG:M(0x6dba72,0.45),gB:M(0x8b6c4a,0.55),
  ck:M(0xb8956a,0.8),ph:M(0xe2d8cc,0.65),
  pG:M(0x3a8a4a,0.7),pT:M(0xc17a52,0.7),
};

// ─── HELPERS ───
function bx(w,h,d,mt){const g=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mt);g.castShadow=true;g.receiveShadow=true;return g}
function cy(rt,rb,h,s,mt){const g=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s),mt);g.castShadow=true;return g}
function sp(r,mt){const g=new THREE.Mesh(new THREE.SphereGeometry(r,16,12),mt);g.castShadow=true;return g}
function P(o,x,y,z){o.position.set(x,y,z);return o}

// ─── FLOOR ───
const fl=bx(RW,0.1,RD,m.fl);P(fl,0,-0.05,0);fl.receiveShadow=true;scene.add(fl);
for(let i=0;i<Math.ceil(RD/0.25);i++){
  const pk=bx(RW,0.004,0.22,i%3===0?m.flP:m.fl);
  P(pk,0,0.005,-HD+0.12+i*0.25);pk.receiveShadow=true;scene.add(pk);
}

// ─── WALLS ───
const wallsG=new THREE.Group();
const ceilG=new THREE.Group();

function makeWall(w,h,x,y,z,ry,gray){
  const g=new THREE.Group();
  g.add(bx(w,h,WT,m.wE));
  g.add(P(bx(w-0.01,h-0.01,0.005,gray?m.wG:m.wI),0,0,-WT/2-0.002));
  if(!gray)g.add(P(bx(w,0.07,0.02,m.bb),0,-h/2+0.035,-WT/2-0.01));
  g.position.set(x,y,z);g.rotation.y=ry;return g;
}

const grayH=RH*0.22, mainH=RH*0.78;
// North (Z-): wardrobe wall
wallsG.add(makeWall(RW,mainH, 0,mainH/2,-HD-WT/2, 0,false));
wallsG.add(makeWall(RW,grayH, 0,mainH+grayH/2,-HD-WT/2, 0,true));
// South (Z+): bed/stickers wall
wallsG.add(makeWall(RW,mainH, 0,mainH/2,HD+WT/2, Math.PI,false));
wallsG.add(makeWall(RW,grayH, 0,mainH+grayH/2,HD+WT/2, Math.PI,false));
// East (X+): door+desk+windows
wallsG.add(makeWall(RD,mainH, HW+WT/2,mainH/2,0, -Math.PI/2,false));
wallsG.add(makeWall(RD,grayH, HW+WT/2,mainH+grayH/2,0, -Math.PI/2,false));
// West (X-): window+bed
wallsG.add(makeWall(RD,mainH, -HW-WT/2,mainH/2,0, Math.PI/2,false));
wallsG.add(makeWall(RD,grayH, -HW-WT/2,mainH+grayH/2,0, Math.PI/2,false));

scene.add(wallsG);
ceilG.add(P(bx(RW+WT*2,0.08,RD+WT*2,m.ceil),0,RH+0.04,0));
scene.add(ceilG);

// ─── CARPET ─── (center-south area near bed)
const carpet=bx(1.4,0.015,1.0,m.cp);P(carpet,0.1,0.01,0.3);scene.add(carpet);
for(let i=0;i<4;i++)for(let j=0;j<3;j++){
  if((i+j)%2===0){scene.add(P(bx(0.26,0.018,0.26,m.cpD),0.1-0.44+i*0.33,0.013,0.3-0.24+j*0.33))}
}

// ═══════════════════════════════════════
// WINDOWS — 2 on East wall, 1 on West wall
// ═══════════════════════════════════════
function makeWin(x,y,z,ry,ww=0.82){
  const g=new THREE.Group();
  g.add(bx(ww,1.02,0.08,m.gF));
  const pw=(ww-0.06)/2;
  g.add(P(bx(pw,0.88,0.015,m.gl),-pw/2-0.01,0,0));
  g.add(P(bx(pw,0.88,0.015,m.gl),pw/2+0.01,0,0));
  g.add(P(bx(ww-0.04,0.025,0.035,m.gF),0,0,0.015));
  g.add(P(bx(0.025,0.98,0.035,m.gF),0,0,0.015));
  g.add(P(bx(ww+0.02,0.07,0.1,m.sh),0,0.55,0));
  for(let i=0;i<4;i++)g.add(P(bx(ww-0.06,0.022,0.018,m.sS),0,0.42-i*0.05,0.04));
  g.add(P(bx(ww+0.04,0.03,0.1,m.gF),0,-0.54,0.03));
  g.position.set(x,y,z);g.rotation.y=ry;scene.add(g);
}
// East wall: 2 windows (plan shows segments 1.89 + 1.02 + 0.44 along this wall)
// Window 1: at Z≈0.0 (between desk and south)
makeWin(HW+WT/2, 1.5, 0.2, -Math.PI/2, 1.02);
// Window 2: at Z≈0.8 (south portion)
makeWin(HW+WT/2, 1.5, 1.0, -Math.PI/2, 0.82);
// West wall: 1 window (center-north area, near wardrobe corner)
makeWin(-HW-WT/2, 1.5, -0.3, Math.PI/2, 1.02);

// ═══════════════════════════════════════
// DOOR — East wall, north end
// ═══════════════════════════════════════
const doorG=new THREE.Group();
doorG.add(P(bx(WT+0.04,2.1,0.82,m.bb),0,1.05,0));
doorG.add(P(bx(0.04,2.0,0.75,m.dW),-WT/2-0.02,1.02,0));
doorG.add(P(bx(0.01,0.3,0.5,m.cr),-WT/2-0.04,1.6,0));
doorG.add(P(bx(0.01,0.5,0.5,m.cr),-WT/2-0.04,0.8,0));
// MANEX letters
const ltC=[m.rd,m.gn,m.bMd,m.or,m.yw];
for(let i=0;i<5;i++)doorG.add(P(bx(0.01,0.08,0.075,ltC[i]),-WT/2-0.04,1.95,-0.18+i*0.09));
// Handle
doorG.add(P(bx(0.04,0.08,0.02,m.cM),-WT/2-0.05,1.0,0.2));
doorG.position.set(HW+WT/2,0,-HD+0.5);
scene.add(doorG);

// ═══════════════════════════════════════
// WARDROBE — North wall (Z-), 2.39m wide
// ═══════════════════════════════════════
const ward=new THREE.Group();
const wardW=1.55, shelfW=0.40; // 3 doors ≈1.55 + shelf ≈0.40 ≈ ~2m total display
// Main body
ward.add(P(bx(wardW,1.90,0.52,m.ww),0,0.97,0));
// 3 doors tongue-and-groove
for(let d=-1;d<=1;d++){
  ward.add(P(bx(0.49,1.82,0.025,m.cr),d*0.51,0.97,0.28));
  for(let l=-3;l<=3;l++)ward.add(P(bx(0.003,1.74,0.003,m.cpD),d*0.51+l*0.06,0.97,0.3));
  ward.add(P(sp(0.02,m.bLt),d*0.51,1.0,0.31));
}
// Bookshelf right
ward.add(P(bx(shelfW,1.90,0.52,m.ww),wardW/2+shelfW/2+0.02,0.97,0));
for(let i=0;i<4;i++)ward.add(P(bx(shelfW-0.04,0.015,0.48,m.ww),wardW/2+shelfW/2+0.02,0.25+i*0.42,0));
// Books
const bkC=[m.rd,m.bDk,m.gn,m.yw,m.or,m.bMd];
for(let s=0;s<3;s++)for(let b=0;b<4;b++){
  const bh=0.15+Math.random()*0.08;
  ward.add(P(bx(0.05,bh,0.11,bkC[(s*4+b)%6]),wardW/2+shelfW/2+0.02-0.1+b*0.065,0.33+s*0.42+bh/2,0));
}
// Stuffed bear on top
ward.add(P(sp(0.065,m.cr),wardW/2+shelfW/2+0.02,1.97,0.05));
ward.add(P(sp(0.048,m.cr),wardW/2+shelfW/2+0.02,2.06,0.05));
// Photo frame on shelf
ward.add(P(bx(0.08,0.1,0.015,m.yw),wardW/2+shelfW/2+0.02,0.78,0.23));
// Small felt plant on door knob
ward.add(P(sp(0.02,m.pG),0.51,1.12,0.33));
ward.add(P(cy(0.012,0.015,0.025,6,m.pT),0.51,1.08,0.33));

// Position wardrobe against north wall, shifted slightly west
ward.position.set(-0.4,0,-HD+0.3);
scene.add(ward);

// ═══════════════════════════════════════
// DESK — East wall, south of door
// ═══════════════════════════════════════
const desk=new THREE.Group();
// Desk top: ~1.5m long (Z-axis along wall), 0.60m deep (X)
desk.add(P(bx(0.60,0.035,1.5,m.ww),0,0.74,0));
// Drawer unit south end
desk.add(P(bx(0.54,0.68,0.38,m.ww),0,0.35,0.53));
for(let i=0;i<4;i++){
  desk.add(P(bx(0.015,0.13,0.35,m.cr),-0.28,0.1+i*0.16,0.53));
  desk.add(P(bx(0.01,0.012,0.12,m.cM),-0.29,0.1+i*0.16,0.53));
}
// North end legs
desk.add(P(bx(0.04,0.72,0.04,m.ww),-0.26,0.36,-0.72));
desk.add(P(bx(0.04,0.72,0.04,m.ww),0.26,0.36,-0.72));
desk.add(P(bx(0.48,0.04,0.04,m.ww),0,0.15,-0.72));

// Laptop (closed, black with red label)
desk.add(P(bx(0.22,0.02,0.3,m.bk),0,0.77,-0.15));
desk.add(P(bx(0.04,0.005,0.1,m.rd),0,0.785,-0.15));
// Pencil cup
desk.add(P(cy(0.028,0.032,0.09,8,m.bk),-0.1,0.8,0.15));
for(let i=0;i<3;i++){const p=cy(0.004,0.004,0.12,6,[m.gn,m.rd,m.yw][i]);P(p,-0.1+i*0.01,0.88,0.15);p.rotation.z=0.04*i-0.03;desk.add(p)}
// Water bottle
desk.add(P(cy(0.025,0.025,0.14,8,m.bMd),0.1,0.83,0.25));
desk.add(P(cy(0.027,0.027,0.02,8,m.bDk),0.1,0.91,0.25));
// Desk lamp (north end)
desk.add(P(cy(0.045,0.05,0.015,12,m.bk),-0.12,0.76,-0.55));
desk.add(P(cy(0.01,0.01,0.3,8,m.bk),-0.12,0.92,-0.55));
desk.add(P(bx(0.08,0.04,0.065,m.bk),-0.1,1.08,-0.55));
// Papers
desk.add(P(bx(0.28,0.012,0.2,m.cr),0.05,0.76,0.2));
// Radio/speaker

// CONTROLS

let wTr=true,rOff=true;
function setOp(g,op){g.traverse(c=>{if(c.isMesh){c.material=c.material.clone();c.material.transparent=true;c.material.opacity=op;c.material.depthWrite=op>0.5}})}

  wTr=!wTr;setOp(wallsG,wTr?0.12:1.0);
  document.getElementById('wallBtn').textContent=wTr?'Hormak: Gardenak':'Hormak: Solidoak';
  document.getElementById('wallBtn').classList.toggle('active',wTr);
}

  document.getElementById('roofBtn').classList.toggle('active',rOff);

// ─── ORBIT ───
let mD=false,rD=false,mx,my;
let rX=0.5,rY=-0.7,tRX=0.5,tRY=-0.7;
let dist=7.5,tDist=7.5;
let pX=0,pY=1.1,pZ=0,tPX=0,tPY=1.1,tPZ=0;

renderer.domElement.addEventListener('mousedown',e=>{
  if(e.button===0){mD=true;mx=e.clientX;my=e.clientY}
  if(e.button===2){rD=true;mx=e.clientX;my=e.clientY}
});
renderer.domElement.addEventListener('mousemove',e=>{
  const dx=e.clientX-mx,dy=e.clientY-my;
  if(mD){tRY-=dx*0.004;tRX-=dy*0.004;tRX=Math.max(-1.3,Math.min(1.3,tRX))}
  if(rD){tPX-=dx*0.003*Math.cos(rY);tPZ-=dx*0.003*Math.sin(rY);tPY+=dy*0.003}
  mx=e.clientX;my=e.clientY;
});
window.addEventListener('mouseup',()=>{mD=rD=false});
renderer.domElement.addEventListener('wheel',e=>{e.preventDefault();tDist+=e.deltaY*0.004;tDist=Math.max(1.5,Math.min(16,tDist))},{passive:false});
renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());

let tD0=0;
renderer.domElement.addEventListener('touchstart',e=>{e.preventDefault();
  if(e.touches.length===1){mD=true;mx=e.touches[0].clientX;my=e.touches[0].clientY}
  else if(e.touches.length===2){mD=false;tD0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)}
},{passive:false});
renderer.domElement.addEventListener('touchmove',e=>{e.preventDefault();
  if(e.touches.length===1&&mD){const dx=e.touches[0].clientX-mx,dy=e.touches[0].clientY-my;
    tRY-=dx*0.004;tRX-=dy*0.004;tRX=Math.max(-1.3,Math.min(1.3,tRX));mx=e.touches[0].clientX;my=e.touches[0].clientY}
  else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    tDist-=(d-tD0)*0.015;tDist=Math.max(1.5,Math.min(16,tDist));tD0=d}
},{passive:false});
renderer.domElement.addEventListener('touchend',()=>{mD=false});

function flyTo(t){
  document.querySelectorAll('.btn:not(.special)').forEach(b=>b.classList.remove('active'));
  if(event&&event.target&&!event.target.classList.contains('special'))event.target.classList.add('active');
  switch(t){
    case'overview':tDist=7.5;tRX=0.5;tRY=-0.7;tPX=0;tPY=1.1;tPZ=0;showLabel('Ikuspegi orokorra — 3.81m × 3.35m');break;
    case'bed':tDist=3.5;tRX=0.35;tRY=-1.6;tPX=-HW+BL/2;tPY=0.7;tPZ=HD-0.5;showLabel('Ohea 1.35×1.90m — Stitch eta peluche');break;
    case'desk':tDist=3.2;tRX=0.3;tRY=0.15;tPX=HW-0.5;tPY=1.0;tPZ=-0.15;showLabel('Ikasteko mahaia');break;
    case'wardrobe':tDist=4;tRX=0.3;tRY=-0.4;tPX=-0.4;tPY=1.0;tPZ=-HD+0.3;showLabel('Armairua — 3 ate + liburutegia');break;
    case'top':tDist=6.5;tRX=1.3;tRY=-0.3;tPX=0;tPY=0.3;tPZ=0;showLabel('Goitik — planoa');break;
  }
}
function showLabel(t){const el=document.getElementById('label');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}

function animate(){
  requestAnimationFrame(animate);
  rX+=(tRX-rX)*0.07;rY+=(tRY-rY)*0.07;dist+=(tDist-dist)*0.07;
  pX+=(tPX-pX)*0.07;pY+=(tPY-pY)*0.07;pZ+=(tPZ-pZ)*0.07;
  camera.position.set(pX+dist*Math.cos(rX)*Math.sin(rY),pY+dist*Math.sin(rX),pZ+dist*Math.cos(rX)*Math.cos(rY));
  camera.lookAt(pX,pY,pZ);renderer.render(scene,camera);
}
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
setTimeout(()=>document.getElementById('loading').classList.add('hide'),500);
animate();
